  <text x="110" y="220" fill="#111827" font-size="30" font-family="Segoe UI, Arial, sans-serif">Headline card only: envoy channel remains active</text>
  <text x="110" y="270" fill="#475569" font-size="24" font-family="Segoe UI, Arial, sans-serif">This fixture represents a captured page card from a blocked article.</text>
